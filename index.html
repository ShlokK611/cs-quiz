<!DOCTYPE html>
<html>
<head>
<title>CS Quiz</title>
<style>
body { font-family: Arial; text-align: center; background: #f4f4f4; }
#box { background: white; padding: 20px; margin: auto; width: 320px; }
button { margin: 5px; padding: 10px; width: 100%; }

.correct { background-color: lightgreen; }
.wrong { background-color: lightcoral; }

.review { text-align: left; margin-top: 10px; font-size: 14px; }
</style>
</head>

<body>

<div id="box">
<h2>Computer Science Quiz</h2>

<p id="progress"></p>
<p id="timer">Time: 20</p>
<p id="question">Press Start</p>

<div id="choices"></div>
<p id="score"></p>
<div id="review"></div>

<button onclick="startQuiz()">Start</button>
</div>

<script>

// -------- LIST --------
let questions = [
{q:"What does CPU stand for?", a:["Central Process Unit","Central Processing Unit","Computer Personal Unit","Control Processing Unit"], c:1},
{q:"Binary uses which numbers?", a:["0 and 1","1 and 2","2 and 3","0 and 2"], c:0},
{q:"What does RAM do?", a:["Stores permanent data","Runs programs temporarily","Controls internet","Displays graphics"], c:1},
{q:"HTML is used to?", a:["Style pages","Structure web pages","Store data","Run programs"], c:1},
{q:"JavaScript is mainly used for?", a:["Styling","Interactivity","Hardware","Storage"], c:1},
{q:"What is an algorithm?", a:["A bug","A step-by-step process","A computer","A program error"], c:1},
{q:"What does URL stand for?", a:["Uniform Resource Locator","Universal Reference Link","User Resource Link","Uniform Read Link"], c:0},
{q:"What is debugging?", a:["Adding features","Fixing errors","Deleting code","Running code"], c:1},
{q:"What does input mean?", a:["Output data","User gives data","Deleting data","Saving data"], c:1},
{q:"What does output mean?", a:["User gives data","Program shows result","Deleting files","Storing memory"], c:1},
{q:"What is a variable?", a:["A fixed value","A storage for data","A loop","A function"], c:1},
{q:"What does loop do?", a:["Runs once","Repeats code","Deletes code","Stops program"], c:1},
{q:"What is an example of hardware?", a:["Keyboard","Google","App","Website"], c:0},
{q:"What is software?", a:["Physical parts","Programs and apps","Wires","Chips"], c:1},
{q:"What does the Internet do?", a:["Connects computers","Stores RAM","Runs CPU","Deletes files"], c:0}
];

// -------- VARIABLES --------
let current = 0;
let score = 0;
let time = 20;
let timer;
let userAnswers = [];

// -------- PROCEDURE --------
function showQuestion(index) {

    document.getElementById("progress").innerText =
        "Question " + (index + 1) + " / " + questions.length;

    let q = questions[index];
    document.getElementById("question").innerText = q.q;

    let choicesHTML = "";

    for (let i = 0; i < q.a.length; i++) { // LOOP
        choicesHTML += `<button id="btn${i}" onclick="checkAnswer(${i})">${q.a[i]}</button>`;
    }

    document.getElementById("choices").innerHTML = choicesHTML;
}

// -------- TIMER --------
function startTimer() {
    clearInterval(timer);
    time = 20;
    document.getElementById("timer").innerText = "Time: " + time;

    timer = setInterval(function() {
        time--;
        document.getElementById("timer").innerText = "Time: " + time;

        if (time == 0) {
            userAnswers.push(null);
            nextQuestion();
        }
    }, 1000);
}

// -------- CHECK ANSWER --------
function checkAnswer(choice) {
    clearInterval(timer);

    userAnswers.push(choice);

    let correct = questions[current].c;

    // highlight answers
    for (let i = 0; i < 4; i++) {
        let btn = document.getElementById("btn" + i);

        if (i == correct) {
            btn.classList.add("correct");
        } else if (i == choice) {
            btn.classList.add("wrong");
        }
    }

    if (choice == correct) { // SELECTION
        score++;
    }

    setTimeout(function() {
        nextQuestion();
    }, 1000);
}

// -------- NEXT --------
function nextQuestion() {
    clearInterval(timer);
    current++;

    if (current < questions.length) {
        showQuestion(current);
        startTimer();
    } else {
        endQuiz();
    }
}

// -------- START (WITH SHUFFLE BUILT-IN) --------
function startQuiz() {

    // SHUFFLE ALGORITHM
    for (let i = questions.length - 1; i > 0; i--) { // ITERATION
        let j = Math.floor(Math.random() * (i + 1));

        let temp = questions[i];
        questions[i] = questions[j];
        questions[j] = temp;
    }

    current = 0;
    score = 0;
    userAnswers = [];

    document.getElementById("review").innerHTML = "";

    showQuestion(current);
    startTimer();
}

// -------- END --------
function endQuiz() {
    document.getElementById("progress").innerText = "";
    document.getElementById("question").innerText = "Done!";
    document.getElementById("choices").innerHTML = "";
    document.getElementById("timer").innerText = "";

    document.getElementById("score").innerText =
        "Score: " + score + " / " + questions.length;

    let reviewHTML = "<h3>Review:</h3>";

    for (let i = 0; i < questions.length; i++) { // LOOP
        let q = questions[i];

        let userAns = userAnswers[i] !== null
            ? q.a[userAnswers[i]]
            : "No Answer";

        let correctAns = q.a[q.c];

        reviewHTML += `
        <div class="review">
        <b>${q.q}</b><br>
        Your Answer: ${userAns}<br>
        Correct Answer: ${correctAns}
        </div><br>`;
    }

    document.getElementById("review").innerHTML = reviewHTML;
}

</script>

</body>
</html>
